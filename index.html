<!DOCTYPE html>
<html dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>وسام مارت — الإدارة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#fff;min-height:100vh;overflow-x:hidden}
:root{--primary:#3b82f6;--primary-light:#60a5fa;--bg:#0f172a;--card:#1e293b;--muted:#94a3b8;--border:#334155;--success:#22c55e;--danger:#ef4444;--yellow:#f59e0b}
input,select,textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:#fff;font-size:14px;margin-bottom:10px}
input:focus{outline:2px solid var(--primary);border-color:transparent}
button{cursor:pointer;font-weight:bold;border:none;border-radius:8px;padding:10px 20px;font-size:14px;transition:.2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-yellow{background:var(--yellow);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
img{max-width:100%;border-radius:8px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{display:none;padding:20px;max-width:900px;margin:auto}
.screen.active{display:block}
#loginScreen{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;max-width:400px;gap:16px;text-align:center}
.logo{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:12px;color:var(--primary)}
.card .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card .hdr h3{margin:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:20px}
.err{color:var(--danger);font-size:13px;display:none;margin-top:8px}
.hidden{display:none!important}
.item-card{display:flex;gap:12px;padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px;align-items:center}
.item-card img{width:50px;height:50px;object-fit:cover;border-radius:8px}
.item-card .info{flex:1}
.item-card .info .name{font-weight:bold;font-size:14px}
.item-card .info .sub{font-size:11px;color:var(--muted)}
.item-card .actions{display:flex;gap:6px;flex-wrap:wrap}
.item-card .actions button{font-size:11px;padding:4px 10px}
.nav-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.nav-tabs button{white-space:nowrap;font-size:13px;padding:8px 16px;border-radius:20px;background:var(--card);color:var(--muted)}
.nav-tabs button.active{background:var(--primary);color:#fff}
.tab{display:none}
.tab.active{display:block}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;margin:0}
.green-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:4px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
</style>
</head><body>

<div class="screen" id="loginScreen">
  <div class="logo">وسام مارت</div>
  <p style="color:var(--muted)">لوحة الإدارة</p>
  <div class="card" style="width:100%;max-width:350px">
    <h3 style="text-align:center;color:#fff">تسجيل الدخول</h3>
    <div style="margin-bottom:8px"><label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px">اسم المستخدم</label><input id="loginUser" placeholder="أدخل اسم المستخدم"></div>
    <div style="margin-bottom:8px"><label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px">كلمة المرور</label><input id="loginPass" type="password" placeholder="أدخل كلمة المرور"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn-primary" onclick="doLogin()" id="loginBtn" style="margin-top:8px">دخول</button>
  </div>
</div>

<div class="screen" id="mainScreen">
  <div class="top-bar">
    <h1>⚙️ الإدارة</h1>
    <div style="display:flex;gap:8px;align-items:center"><span id="roleDisplay" style="font-size:13px;color:var(--muted)"></span><button class="btn-outline" onclick="doLogout()" style="font-size:12px;padding:6px 12px">تسجيل خروج</button></div>
  </div>

  <div class="nav-tabs" id="navTabs">
    <button class="active" data-tab="products" onclick="showTab('products')">📦 المنتجات</button>
    <button data-tab="delivery" onclick="showTab('delivery')">🚚 الموصلين</button>
    <button data-tab="staff" onclick="showTab('staff')">👥 المشرفين</button>
    <button data-tab="categories" onclick="showTab('categories')">🏷️ الأقسام</button>
    <button data-tab="orders" onclick="showTab('orders')">📋 الطلبات</button>
    <button data-tab="settings" onclick="showTab('settings')">⚙️ الإعدادات</button>
  </div>

  <!-- ====== Products Tab ====== -->
  <div class="tab active" id="tabProducts">
    <div class="search-bar">
      <input id="productSearch" placeholder="🔍 بحث..." oninput="renderProducts()">
      <button class="btn-primary" onclick="showAddProduct()">+ إضافة</button>
      <button class="btn-outline" onclick="fetchData('products')">🔄</button>
    </div>
    <div id="productsList"></div>
  </div>

  <!-- ====== Delivery Boys Tab ====== -->
  <div class="tab" id="tabDelivery">
    <div style="margin-bottom:12px"><button class="btn-primary" onclick="showAddDelivery()">+ إضافة موصل</button><button class="btn-outline" style="margin-right:8px" onclick="fetchData('deliveryBoys')">🔄</button></div>
    <div id="deliveryList"></div>
  </div>

  <!-- ====== Staff Tab ====== -->
  <div class="tab" id="tabStaff">
    <div style="margin-bottom:12px"><button class="btn-primary" onclick="showAddStaff()">+ إضافة مشرف</button><button class="btn-outline" style="margin-right:8px" onclick="fetchData('staff')">🔄</button></div>
    <div id="staffList"></div>
  </div>

  <!-- ====== Categories Tab ====== -->
  <div class="tab" id="tabCategories">
    <div style="margin-bottom:12px"><button class="btn-primary" onclick="showAddCategory()">+ إضافة قسم</button><button class="btn-outline" style="margin-right:8px" onclick="loadCustomCategories()">🔄</button></div>
    <div id="categoriesList"></div>
  </div>

  <!-- ====== Orders Tab ====== -->
  <div class="tab" id="tabOrders">
    <div style="margin-bottom:12px"><button class="btn-outline" onclick="fetchOrders()">🔄 تحديث</button></div>
    <div id="ordersList"></div>
  </div>

  <!-- ====== Settings Tab ====== -->
  <div class="tab" id="tabSettings">
    <div class="card">
      <h3>⚙️ الإعدادات</h3>
      <div class="settings-row"><span>رسوم التوصيل</span><div><input id="deliveryFee" type="number" style="width:100px;display:inline;margin:0"><button class="btn-primary" onclick="saveDeliveryFee()" style="margin-right:8px;padding:8px 12px;font-size:12px">حفظ</button></div></div>
      <div class="settings-row" id="categoriesStatus"></div>
      <div style="margin-top:12px"><button class="btn-outline" onclick="loadSettings()" style="font-size:12px;padding:6px 12px">🔄 تحديث الإعدادات</button></div>
    </div>
  </div>
</div>

<!-- ====== Add/Edit Product Modal ====== -->
<div class="screen" id="productModal" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;justify-content:center;align-items:center;overflow-y:auto;padding:20px">
  <div class="card" style="width:100%;max-width:500px">
    <h3 id="productModalTitle">إضافة منتج</h3>
    <input id="pName" placeholder="اسم المنتج">
    <input id="pPrice" placeholder="السعر (مثال: 10 ريال)">
    <input id="pStoreType" placeholder="نوع المتجر (مثال: market)">
    <input id="pOptionName" placeholder="اسم الخيار (اختياري)">
    <input id="pOptionValues" placeholder="قيم الخيارات مفصولة بفواصل (اختياري)">
    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px">صورة المنتج</label>
    <input id="pImageFile" type="file" accept="image/*" onchange="previewImage(this,'pPreview')">
    <img id="pPreview" class="hidden" style="max-height:200px;margin-bottom:8px">
    <input id="pId" type="hidden">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-primary" onclick="saveProduct()" id="saveBtn" style="flex:1">إضافة</button>
      <button class="btn-outline" onclick="closeModal('productModal')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>

<!-- ====== Add Delivery Modal ====== -->
<div class="screen" id="deliveryModal" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;justify-content:center;align-items:center;overflow-y:auto;padding:20px">
  <div class="card" style="width:100%;max-width:400px">
    <h3>إضافة موصل</h3>
    <input id="dBUsername" placeholder="اسم المستخدم"><input id="dBPassword" type="password" placeholder="كلمة المرور">
    <input id="dBFullName" placeholder="الاسم الكامل"><input id="dBPhone" placeholder="رقم الجوال">
    <input id="dBEmail" placeholder="البريد الإلكتروني (اختياري)">
    <input type="hidden" id="dBDelId">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-primary" onclick="saveDelivery()" style="flex:1">حفظ</button>
      <button class="btn-outline" onclick="closeModal('deliveryModal')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>

<!-- ====== Add Staff Modal ====== -->
<div class="screen" id="staffModal" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;justify-content:center;align-items:center;overflow-y:auto;padding:20px">
  <div class="card" style="width:100%;max-width:400px">
    <h3>إضافة مشرف</h3>
    <input id="sUsername" placeholder="اسم المستخدم"><input id="sPassword" type="password" placeholder="كلمة المرور">
    <input id="sEmail" placeholder="البريد الإلكتروني">
    <select id="sStoreType"><option value="">اختر القسم...</option><option value="market">البقالات</option><option value="restaurant">المطاعم</option><option value="coffee">كوفي</option><option value="coffeeMudhal">كوفي مدهال</option><option value="veggies">خضار وفواكه</option><option value="homemade">إسر منتجات</option></select>
    <input type="hidden" id="sStaffId">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-primary" onclick="saveStaff()" style="flex:1">حفظ</button>
      <button class="btn-outline" onclick="closeModal('staffModal')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>

<!-- ====== Add Category Modal ====== -->
<div class="screen" id="catModal" style="position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;justify-content:center;align-items:center;overflow-y:auto;padding:20px">
  <div class="card" style="width:100%;max-width:400px">
    <h3>إضافة قسم مخصص</h3>
    <input id="cName" placeholder="اسم القسم"><input id="cDesc" placeholder="وصف (اختياري)">
    <input id="cEmoji" placeholder="ايموجي (اختياري)" value="📦">
    <input id="cImageFile" type="file" accept="image/*">
    <img id="cPreview" class="hidden" style="max-height:150px;margin-bottom:8px">
    <select id="cParent"><option value="">قسم رئيسي</option></select>
    <input type="hidden" id="cCatId">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-primary" onclick="saveCategory()" style="flex:1">حفظ</button>
      <button class="btn-outline" onclick="closeModal('catModal')" style="flex:1">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ==================== REST API Helper ====================
const PID='wessam2',KEY='AIzaSyBGM-ORvTV4juxPfiA8Mb7Vb25_0EQchEY';
const BASE=`https://firestore.googleapis.com/v1/projects/${PID}/databases/(default)/documents`;

async function api(method,path,body){
  const opt={method,headers:{}};
  if(body){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify({fields:toFields(body)})}
  if(method==='GET'&&!path.includes('?'))path+='?key='+KEY;
  else if(method==='GET')path+='&key='+KEY;
  else path+='?key='+KEY;
  const r=await fetch(BASE+'/'+path,opt);
  if(r.status===429)throw new Error('الحد مسموح تجاوز، حاول بعد دقيقة');
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}
function apiGet(path){return api('GET',path)}
function apiAdd(collection,data){return api('POST',collection,data)}
function apiUpdate(collection,docId,data){return api('PATCH',collection+'/'+docId,data)}
function apiDelete(collection,docId){return api('DELETE',collection+'/'+docId)}

function toFields(o){
  const f={};for(const[k,v]of Object.entries(o||{})){
    if(v===null||v===undefined)f[k]={nullValue:null};
    else if(typeof v==='string')f[k]={stringValue:v};
    else if(typeof v==='boolean')f[k]={booleanValue:v};
    else if(typeof v==='number')f[k]=Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
    else if(Array.isArray(v))f[k]={arrayValue:{values:v.map(x=>({stringValue:String(x)}))}};
    else f[k]={stringValue:String(v)};
  }return f;
}
function fromFields(f){
  if(!f)return{};const o={};
  for(const[k,v]of Object.entries(f)){
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
    else if(v.integerValue!==undefined)o[k]=Number(v.integerValue);
    else if(v.doubleValue!==undefined)o[k]=v.doubleValue;
    else if(v.arrayValue)o[k]=v.arrayValue.values?v.arrayValue.values.map(x=>x.stringValue):[];
    else if(v.nullValue!==null&&v.nullValue!==undefined)o[k]=null;
    else if(v.mapValue)o[k]=v.mapValue.fields;else o[k]=null;
  }return o;
}
function docs(r){return(r.documents||[]).map(d=>({id:d.name.split('/').pop(),...fromFields(d.fields)}))}

// ==================== State ====================
let user=null,role=null,cached={products:[],deliveryBoys:[],staff:[],categories:[],orders:[]};

async function _hash(p){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}

// ==================== Login ====================
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();
  const err=document.getElementById('loginErr');err.style.display='none';
  if(!u||!p){err.textContent='أدخل اسم المستخدم وكلمة المرور';err.style.display='block';return}
  document.getElementById('loginBtn').disabled=true;document.getElementById('loginBtn').textContent='...';
  try{
    // Check staff collection
    const r=await apiGet('staff');
    const staffDocs=docs(r);
    const match=staffDocs.filter(d=>d.username===u||d.username.toLowerCase()===u.toLowerCase());
    if(match.length){
      const md=match[0];const sp=md.password||'';
      let ok=false;
      if(sp.length===64){const hp=await _hash(p);ok=hp===sp||(await _hash(p.toLowerCase()))===sp}
      else ok=sp===p||sp===p.trim();
      if(ok){
        user=md;role=(md.role==='admin'||u==='admin'||u==='wessam')?'admin':'manager';
        enterDashboard();return;
      }
    }
    err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';
  }catch(e){err.textContent=e.message;err.style.display='block'}
  document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='دخول';
}

function enterDashboard(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('roleDisplay').textContent=user.fullName||user.username+' ('+role+')';
  // Show/hide tabs based on role
  if(role==='manager'){
    document.querySelectorAll('[data-tab]').forEach(b=>{if(b.dataset.tab!=='products'&&b.dataset.tab!=='orders')b.style.display='none'});
  }
  loadAll();
}

function doLogout(){user=null;role=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('mainScreen').classList.remove('active');document.getElementById('loginUser').value='';document.getElementById('loginPass').value=''}

// ==================== Tab System ====================
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('[data-tab]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  if(name==='products')renderProducts();
  else if(name==='delivery')renderDelivery();
  else if(name==='staff')renderStaff();
  else if(name==='categories')renderCategories();
  else if(name==='orders')fetchOrders();
  else if(name==='settings')loadSettings();
}

// ==================== Data Loading ====================
async function loadAll(){
  await Promise.all([fetchData('products'),fetchData('deliveryBoys'),fetchData('staff'),loadCustomCategories(),loadSettings()]);
  renderProducts();
}
async function fetchData(col){
  try{const r=await apiGet(col);cached[col]=docs(r);if(col==='products')renderProducts();else if(col==='deliveryBoys')renderDelivery();else if(col==='staff')renderStaff()}catch(e){}
}
async function loadCustomCategories(){
  try{const r=await apiGet('customCategories');cached.categories=docs(r);renderCategories()}catch(e){}
}
async function loadSettings(){
  try{
    const r=await apiGet('settings/delivery');
    if(r.fields){const fee=r.fields.fee?.integerValue||r.fields.fee?.doubleValue||10;document.getElementById('deliveryFee').value=fee}
  }catch(e){}
  try{
    const r=await apiGet('settings/categories');
    const el=document.getElementById('categoriesStatus');
    if(r.fields){let h='';for(const[k,v]of Object.entries(r.fields)){const val=v.booleanValue!==undefined?v.booleanValue:null;h+=`<span style="font-size:12px;color:var(--muted)">${k}: ${val===false?'❌':'✅'}</span> `}el.innerHTML=h}
  }catch(e){}
}

// ==================== Products ====================
function renderProducts(){
  const search=(document.getElementById('productSearch').value||'').toLowerCase();
  let items=cached.products;
  if(search)items=items.filter(p=>p.name.toLowerCase().includes(search)||(p.storeType||'').toLowerCase().includes(search));
  const el=document.getElementById('productsList');
  if(!items.length){el.innerHTML='<p style="color:var(--muted)">لا توجد منتجات</p>';return}
  el.innerHTML=items.map(p=>`<div class="item-card">
    <img src="${p.image||'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
    <div class="info"><div class="name">${p.name}</div><div class="sub">${p.price} • ${p.storeType||''}</div></div>
    <div class="actions"><button class="btn-yellow" onclick="editProduct('${p.id}')">✏️</button><button class="btn-danger" onclick="deleteProduct('${p.id}')">🗑️</button></div>
  </div>`).join('');
}

function showAddProduct(){document.getElementById('productModalTitle').textContent='إضافة منتج';document.getElementById('pId').value='';clearModal('productModal');document.getElementById('productModal').style.display='flex'}
function editProduct(id){
  const p=cached.products.find(x=>x.id===id);if(!p)return;
  document.getElementById('productModalTitle').textContent='تعديل منتج';
  document.getElementById('pId').value=id;document.getElementById('pName').value=p.name||'';
  document.getElementById('pPrice').value=p.price||'';document.getElementById('pStoreType').value=p.storeType||'';
  document.getElementById('pOptionName').value=p.optionName||'';document.getElementById('pOptionValues').value=(p.options||[]).join(',');
  document.getElementById('pPreview').src=p.image||'';document.getElementById('pPreview').classList.toggle('hidden',!p.image);
  document.getElementById('productModal').style.display='flex';
}

async function saveProduct(){
  const id=document.getElementById('pId').value;
  const name=document.getElementById('pName').value.trim();
  const price=document.getElementById('pPrice').value.trim();
  if(!name||!price){alert('اسم المنتج والسعر مطلوبين');return}
  let image=document.getElementById('pPreview').src||'';
  if(image.startsWith('data:')||!image){}else image='';
  // If new image selected, convert to base64
  const fi=document.getElementById('pImageFile');
  if(fi.files[0]){image=await fileToBase64(fi.files[0])}
  const data={storeType:document.getElementById('pStoreType').value.trim()||'market',name,price,image,
    optionName:document.getElementById('pOptionName').value.trim()||null,
    options:(document.getElementById('pOptionValues').value||'').split(',').map(v=>v.trim()).filter(v=>v)}
  try{
    if(id)await apiUpdate('products',id,data);
    else await apiAdd('products',data);
    await fetchData('products');closeModal('productModal');alert(id?'تم التحديث✅':'تمت الإضافة✅')
  }catch(e){alert('خطأ: '+e.message)}
}

async function deleteProduct(id){
  if(!confirm('متأكد من حذف المنتج؟'))return;
  try{await apiDelete('products',id);await fetchData('products')}catch(e){alert('خطأ: '+e.message)}
}

// ==================== Delivery Boys ====================
function renderDelivery(){
  const items=cached.deliveryBoys;const el=document.getElementById('deliveryList');
  if(!items.length){el.innerHTML='<p style="color:var(--muted)">لا يوجد موصلين</p>';return}
  el.innerHTML=items.map(d=>`<div class="item-card">
    <div class="info"><div class="name">${d.fullName||d.username}</div><div class="sub">${d.phone||''} • ${d.status||''} ${d.isOnline?'🟢':'🔴'}</div></div>

}

// ==================== Categories ====================
function renderCategories(){
  const items=cached.categories;const el=document.getElementById('categoriesList');
  if(!items.length){el.innerHTML='<p style="color:var(--muted)">لا توجد أقسام مخصصة</p>';return}
  el.innerHTML=items.map(c=>`<div class="item-card">
    <div class="info"><div class="name">${c.emoji||'📦'} ${c.name}</div><div class="sub">${c.desc||''} • ${c.parentId||'رئيسي'}</div></div>
    <div class="actions"><button class="btn-danger" onclick="deleteCategory('${c.id}')">🗑️</button></div>
  </div>`).join('');
}
function showAddCategory(){
  clearModal('catModal');
  const sel=document.getElementById('cParent');sel.innerHTML='<option value="">قسم رئيسي</option>';
  cached.categories.filter(c=>!c.parentId).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;sel.appendChild(o)});
  document.getElementById('catModal').style.display='flex'
}
async function saveCategory(){
  const id=document.getElementById('cCatId').value||('custom_'+Date.now());
  let image=null;const fi=document.getElementById('cImageFile');
  if(fi.files[0])image=await fileToBase64(fi.files[0]);
  const data={id,name:g('cName'),desc:g('cDesc'),emoji:g('cEmoji')||'📦',image,enabled:true,parentId:document.getElementById('cParent').value||null}
  try{
    await apiAdd('customCategories',data);
    await loadCustomCategories();closeModal('catModal');alert('تمت الإضافة✅')
  }catch(e){alert('خطأ: '+e.message)}
}
async function deleteCategory(id){if(!confirm('متأكد؟'))return;try{await apiDelete('customCategories',id);await loadCustomCategories()}catch(e){}}

// ==================== Orders ====================
async function fetchOrders(){
  const el=document.getElementById('ordersList');el.innerHTML='<p style="color:var(--muted)">جاري التحميل...</p>';
  try{const r=await apiGet('orders');const orders=docs(r);orders.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    if(!orders.length){el.innerHTML='<p style="color:var(--muted)">لا توجد طلبات</p>';return}
    el.innerHTML=orders.map(o=>`<div class="item-card"><div class="info"><div class="name">${o.customerName||'عميل'}</div><div class="sub">${o.total||'?'} ريال • ${o.status||'pending'}</div></div></div>`).join('')
  }catch(e){el.innerHTML='<p style="color:var(--danger)">'+e.message+'</p>'}
}

// ==================== Settings ====================
async function saveDeliveryFee(){
  const fee=parseFloat(document.getElementById('deliveryFee').value);
  if(isNaN(fee))return alert('رقم غير صالح');
  try{await apiAdd('settings',{fee});await loadSettings();alert('تم الحفظ✅')}catch(e){alert('خطأ: '+e.message)}
}

// ==================== Utilities ====================
function g(id){return document.getElementById(id).value.trim()}
function closeModal(id){document.getElementById(id).style.display='none'}
function clearModal(prefix){const m=document.getElementById(prefix);m.querySelectorAll('input,select,textarea').forEach(e=>{if(e.type!='file')e.value=''})}
function previewImage(input,previewId){
  const img=document.getElementById(previewId);
  if(input.files&&input.files[0]){const r=new FileReader();r.onload=e=>{img.src=e.target.result;img.classList.remove('hidden')};r.readAsDataURL(input.files[0])}
}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file)})}
</script>
